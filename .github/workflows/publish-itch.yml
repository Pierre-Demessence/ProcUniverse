name: Publish to itch.io

on:
  push:
    branches: [main]

concurrency:
  group: publish-itch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: procuniverse

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          path: procuniverse

      - uses: actions/checkout@v4
        with:
          repository: Pierre-Demessence/Entity-Cornponent-System-Engine
          path: Entity-Cornponent-System-Engine

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: procuniverse/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Download butler
        working-directory: procuniverse
        run: |
          curl -sL -o butler.zip "https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default"
          unzip -q butler.zip
          chmod +x butler

      - name: Push to itch.io
        working-directory: procuniverse
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push dist corniflex/procuniverse:html5
