<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProcUniverse</title>
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #05060d;
      color: #cfe3ff;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    #root {
      position: fixed;
      inset: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module">
    import { start } from './src/main.ts';
    import { loadOrCreateWorldSeed } from './src/persistence/seed.ts';
    const seed = await loadOrCreateWorldSeed();
    const teardown = start(document.getElementById('root'), seed);
    window.addEventListener('beforeunload', teardown);
  </script>
</body>

</html>
